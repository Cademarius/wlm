  <!-- sourire -->
  <path d="M224 306 q32 28 64 0" stroke="#241B36" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- coeur flottant -->
  <path d="M398 92 c11 -17 41 -11 41 13 c0 20 -30 35 -41 45 c-11 -10 -41 -25 -41 -45 c0 -24 30 -30 41 -13z" fill="url(#heart)"/>
